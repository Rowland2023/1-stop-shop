server {
    listen 80;
    server_name localhost;

    # --- 0. SECURITY & TYPES ---
    # This ensures the browser identifies JS and CSS files correctly
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- 1. FRONTEND: Serve the React build files ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Critical for React Router to handle page refreshes
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoice Service) ---
    location /api/invoices/ {
        proxy_pass http://invoice_service:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 3. NODE.JS (Employee Service) ---
    location /api/employees/ {
        proxy_pass http://node_employee:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 4. DJANGO ADMIN & ACCOUNTS ---
    location /admin/ {
        proxy_pass http://django-backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /accounts/ {
        proxy_pass http://django-backend:8000/accounts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 5. DJANGO MEDIA ASSETS (Images handled by Pillow) ---
    location /media/ {
        proxy_pass http://django-backend:8000/media/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # --- 6. DJANGO STATIC ASSETS ---
    location /static/ {
        proxy_pass http://django-backend:8000/static/;
        proxy_set_header Host $host;
        expires 30d;
    }

    # --- 7. DJANGO API (Core Store) ---
    # Placed last to ensure specific /api/invoices or /api/employees routes match first
    location /api/ {
        proxy_pass http://django-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 8. ERROR HANDLING ---
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}