server {
    listen 10000;
    server_name localhost;

    # 1. SERVE REACT FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoicing Service)
    location /api/invoices/ {
        proxy_pass http://invoice-service-ttn6:8001/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. NODE.JS (Employee Management)
    location /api/employees/ {
        proxy_pass http://employee-management-app-wuq1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. DJANGO CORE (The Mission Critical Fix)
    location /api/ {
        # Using internal name for speed and bypassing CORS
        proxy_pass http://back-end-wdk7:10000/api/;
        
        # We pass the original Host so Django CSRF/Allowed_Hosts checks pass
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # INCREASED TIMEOUTS for Cloudinary uploads (The fix for the 500 error)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Allow large image uploads
        client_max_body_size 20M;
    }

    # 5. ADMIN PANEL & MEDIA
    location /admin/ {
        proxy_pass http://back-end-wdk7:10000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://back-end-wdk7:10000/media/;
        proxy_set_header Host $host;
    }

    # 6. ERROR HANDLING
    error_page   500 502 503 504  /50x.html;
}