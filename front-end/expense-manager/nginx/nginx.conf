server {
    # 1. Match Render's expected port
    listen 10000;
    server_name localhost;

    # 2. Match the EXACT path from your 'ls' output
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # 3. Handle React Routing (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you have a backend, ensure this points to your Render Internal URL
    location /api/ {
        proxy_pass http://your-backend-internal-url:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}