server {
    listen 10000;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # PROXY CONFIGURATION
    location /api/ {
        # Forward to the backend service
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        
        # CRITICAL: Set the Host header to the backend's name
        # This prevents Django from rejecting the request
        proxy_set_header Host back-end-wdk7.onrender.com;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Django from sending 301 redirects that bypass Nginx
        proxy_redirect off;
    }

    # Admin Panel Proxy
    location /admin/ {
        proxy_pass https://back-end-wdk7.onrender.com/admin/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }
}