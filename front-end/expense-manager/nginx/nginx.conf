worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # This is the ONLY listen directive in the whole system now
        listen 10000;
        server_name localhost;

        # 1. Frontend Static Files
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 2. Proxy to Django Backend
        location /api/ {
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            proxy_set_header Host back-end-wdk7.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Proxy to FastAPI Invoices (optional, if calling from frontend)
        location /api/invoices/ {
            proxy_pass https://invoice-service-ttn6.onrender.com/api/invoices/;
            proxy_set_header Host invoice-service-ttn6.onrender.com;
        }
    }
}