server {
    listen 10000; # Render uses port 10000 by default
    server_name localhost;

    # 1. FRONTEND: Serve React static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI: Invoice Generation Service
    # Matches: fetch("/api/invoices/...")
    location /api/invoices/ {
        proxy_pass http://invoice-service-ttn6:8001; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. NODE.JS: Employee Management Service
    # Matches: fetch("/api/employees/...")
    location /api/employees/ {
        proxy_pass http://employee-management-app-wuq1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. DJANGO: Core Store API, Auth, and Payments
    # Matches: fetch("/api/products/"), fetch("/api/login/"), etc.
    location /api/ {
        proxy_pass http://back-end-wdk7:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optimized for Cloudinary/Image uploads (300s timeout)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    # 5. DJANGO ADMIN & JAZZMIN UI
    location /admin/ {
        proxy_pass http://back-end-wdk7:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. STATIC & MEDIA (For Admin CSS and Cloudinary fallbacks)
    location /static/ {
        proxy_pass http://back-end-wdk7:10000;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        proxy_pass http://back-end-wdk7:10000;
        expires 30d;
    }

    # 7. ERROR HANDLING
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}