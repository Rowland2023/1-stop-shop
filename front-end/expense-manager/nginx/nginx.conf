server {
    listen 80;
    server_name localhost;

    # --- 1. FRONTEND: Serve the React/Vite build files ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoice Service) ---
    location /api/invoices {
        # Update with your actual Render URL for the FastAPI service
        proxy_pass https://your-invoice-service.onrender.com; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 3. NODE.JS (Employee Service) ---
    location /api/employees {
        # Update with your actual Render URL for the Node service
        proxy_pass https://employee-management-app-wuq1.onrender.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 4. DJANGO CORE ---
    location /api {
        # Update with your actual Render URL for the Django service
        proxy_pass https://back-end-wdk7.onrender.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 5. ADMIN & STATIC ---
    location /admin {
        proxy_pass https://back-end-wdk7.onrender.com/admin;
        proxy_set_header Host $host;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}