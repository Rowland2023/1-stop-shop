server {
    listen 80;
    server_name localhost;

    # --- 1. FRONTEND ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoice Service) ---
    location /api/invoices/ {
        proxy_pass http://invoice_service:8001;
        include proxy_params; # Standardize headers
    }

    # --- 3. NODE.JS (Employee Service) ---
    location /api/employees/ {
        proxy_pass http://node_employee:3000;
        include proxy_params;
    }

    # --- 4. DJANGO ADMIN & ACCOUNTS ---
    location /admin/ {
        proxy_pass http://django-backend:8000;
        include proxy_params;
    }

    location /accounts/ {
        proxy_pass http://django-backend:8000;
        include proxy_params;
    }

    # --- 5. DJANGO ASSETS (Best for Production) ---
    location /media/ {
        alias /app/media/; # Use volumes if possible
        expires 30d;
    }

    location /static/ {
        alias /app/static/; # Use volumes if possible
        expires 30d;
    }

    # --- 6. DJANGO API (Catch-all for core store logic) ---
    location /api/ {
        proxy_pass http://django-backend:8000;
        include proxy_params;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}