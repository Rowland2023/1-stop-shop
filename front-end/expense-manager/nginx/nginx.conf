server {
    listen 10000;
    server_name localhost;

    location / {
        # This MUST match the path in your Dockerfile COPY command
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Vital for React Router/SPAs to prevent 404s on refresh
        try_files $uri $uri/ /index.html;
    }
    
    # ... your proxy settings
}