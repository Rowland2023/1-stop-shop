server {
    listen 80;
    server_name localhost;

    # 1. FRONTEND (The files inside the Nginx container)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoice Service)
    location /api/invoices/ {
        # Use Internal Hostname, Port 8001
        proxy_pass http://invoice-service-ttn6:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. NODE.JS (Employee Service)
    location /api/employees/ {
        # Use Internal Hostname, Port 3000
        proxy_pass http://employee-management-app-wuq1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. DJANGO (Admin & Core API)
    location /api/ {
        # Use Internal Hostname, Port 8000
        proxy_pass http://back-end-wdk7:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Extra catch for Django Admin
    location /admin/ {
        proxy_pass http://back-end-wdk7:8000;
        proxy_set_header Host $host;
    }
}