events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization for performance
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 10000;
        
        # 1. SERVE FRONTEND
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. SERVE VITE ASSETS
        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            # Cache assets for better performance
            expires 1y;
            add_header Cache-Control "public, imuttable";
        }

        # 3. REVERSE PROXY TO BACKEND
        # This solves the "Not Found" and "CORS" issues for your API
        location /api/ {
            # Ensure this URL matches your Render backend service exactly
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            
            # Essential headers for Django to process the request correctly
            proxy_set_header Host back-end-wdk7.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffering tweaks for high-integrity transactions
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}