# This part handles the main server block
server {
    # Render automatically maps its external port to 10000 or $PORT
    # Using 'listen 10000;' directly is usually safe if you've cleared defaults,
    # but the error says it's duplicated. 
    
    listen 10000;
    server_name localhost;

    # 1. FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoice Service)
    location /api/invoices/ {
        proxy_pass https://invoice-service-ttn6.onrender.com/api/invoices/;
        proxy_set_header Host invoice-service-ttn6.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. NODE.JS (Employee Service)
    location /api/employees/ {
        proxy_pass https://employee-management-app-wuq1.onrender.com/api/employees/;
        proxy_set_header Host employee-management-app-wuq1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. DJANGO (Admin & Core API)
    location /api/ {
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass https://back-end-wdk7.onrender.com/admin/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }
}