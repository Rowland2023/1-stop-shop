events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization: Enable Gzip for faster frontend loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml outdoor/x-icon;

    server {
        listen 10000;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Optimized API Proxy
        location /api/ {
            # 1. Ensure the trailing slash logic is consistent
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            
            # 2. Force SNI (Server Name Indication)
            # Render requires this to route the request to your specific service
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # 3. Standard Headers
            proxy_set_header Host back-end-wdk7.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 4. Timeout settings to prevent 504s during heavy backend tasks
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}