server {
    listen 80;
    server_name localhost;

    # --- 1. FRONTEND: Serve the React/Vite build files ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoice Service) ---
    location /api/invoices {
        # Using your confirmed live Render URL
        proxy_pass https://invoice-service-ttn6.onrender.com; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 3. NODE.JS (Employee Service) ---
    location /api/employees {
        proxy_pass https://employee-management-app-wuq1.onrender.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 4. DJANGO CORE API ---
    location /api {
        proxy_pass https://back-end-wdk7.onrender.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 5. DJANGO ADMIN & STATIC ASSETS ---
    location /admin {
        proxy_pass https://back-end-wdk7.onrender.com/admin;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass https://back-end-wdk7.onrender.com/static/;
        proxy_set_header Host $host;
    }

    # --- Error Handling ---
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}