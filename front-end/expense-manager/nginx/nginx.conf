server {
    listen 10000;
    
    # Ensure this is the EXACT folder containing index.html and the assets folder
    root /usr/share/nginx/html;

    location / {
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Remove the specific /assets/ alias if it's already inside /usr/share/nginx/html
    # Nginx will find it automatically via the root directive above.

    location /api/ {
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}