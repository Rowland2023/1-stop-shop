server {
    listen 10000;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # PROXY BLOCK: Point this to your REAL backend URL
    location /api/ {
        # REMOVE "backend-service-name" and use the actual URL:
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional: Add timeouts to prevent 504 errors on long requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}