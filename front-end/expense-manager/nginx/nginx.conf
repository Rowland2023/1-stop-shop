server {
    listen 10000;
    server_name localhost;

    # 1. SERVE REACT FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoicing)
    location /api/invoices/ {
        proxy_pass https://invoice-service-ttn6.onrender.com/; 
        proxy_set_header Host invoice-service-ttn6.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. NODE.JS (Employee Management)
    location /api/employees/ {
        proxy_pass https://employee-management-app-wuq1.onrender.com/;
        proxy_set_header Host employee-management-app-wuq1.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. DJANGO CORE (Products, Auth, Orders)
    # UPDATED: Use the full public URL to fix ERR_NAME_NOT_RESOLVED
    location /api/ {
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ensure trailing slashes are handled correctly
        proxy_redirect off;
    }

    # 5. ADMIN PANEL
    location /admin/ {
        proxy_pass https://back-end-wdk7.onrender.com/admin/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }

    error_page   500 502 503 504  /50x.html;
}