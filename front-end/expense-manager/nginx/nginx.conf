server {
    listen 10000;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This prevents 404s when refreshing the browser on a React route
        try_files $uri $uri/ /index.html;
    }

    # Optional: Ensure CSS/JS files are cached and served with correct types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}