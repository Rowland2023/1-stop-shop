server {
    listen 10000; # Use 10000 for Render Web Services
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Internal) ---
    location /api/invoices {
        # Use the INTERNAL name from Render dashboard
        proxy_pass http://invoice-service-ttn6:8001; 
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 3. NODE.JS (Internal) ---
    location /api/employees {
        proxy_pass http://employee-management-app-wuq1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 4. DJANGO CORE API (Internal) ---
    location /api {
        proxy_pass http://back-end-wdk7:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 5. DJANGO ADMIN & STATIC ---
    location /admin {
        proxy_pass http://back-end-wdk7:8000/admin;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://back-end-wdk7:8000/static/;
        proxy_set_header Host $host;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}