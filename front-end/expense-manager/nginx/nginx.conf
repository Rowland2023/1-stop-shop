server {
    listen 10000;
    server_name localhost;

    # 1. SERVE REACT FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoicing)
    location /api/invoices/ {
        # Format: http://[Service-Name]:[Port]
        proxy_pass http://invoice-service-ttn6:8001/; 
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. NODE.JS (Employee Management)
    location /api/employees/ {
        proxy_pass http://employee-management-app-wuq1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. DJANGO CORE (Registration, Login, Products)
    location /api/ {
    proxy_pass http://back-end-wdk7:10000/api/;
    
    # Use $http_host to pass the original domain (e.g., front-end-6f9m.onrender.com)
    proxy_set_header Host $http_host; 
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ADD THIS: Increase timeouts for Cloudinary uploads
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
}

    # 5. ADMIN, STATIC, MEDIA
    location /admin/ {
        proxy_pass http://back-end-wdk7:10000/admin/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://back-end-wdk7:10000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
}