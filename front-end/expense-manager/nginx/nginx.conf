events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance: Enable Gzip for faster frontend loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/x-icon;

    server {
        listen 10000;
        server_name localhost;

        # SECURITY: This allows your frontend to pull images from Cloudinary 
        # and talk to your backend API without being blocked by the browser.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://back-end-wdk7.onrender.com https://res.cloudinary.com;" always;

        # 1. Main Frontend Files
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. Optimized API Proxy
        location /api/ {
    proxy_pass https://back-end-wdk7.onrender.com/api/;

    proxy_set_header Host back-end-wdk7.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Content-Type application/json;
    proxy_set_header Accept application/json;

    proxy_http_version 1.1;
    proxy_request_buffering off;

    proxy_ssl_server_name on;
}
        # 3. Optional: Static Fallback for local assets (if not on Cloudinary)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}