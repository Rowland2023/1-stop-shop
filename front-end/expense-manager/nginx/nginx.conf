# nginx.conf
server {
    # Render uses port 10000 by default. Use ONLY ONE listen directive.
    listen 10000;
    server_name localhost;

    # --- 1. FRONTEND ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoice Service) ---
    # NOTE: Replace 'invoice-srv' with your actual Render Internal Service Name
    location /api/invoices/ {
        proxy_pass http://invoice-srv:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 3. NODE.JS (Employee Service) ---
    location /api/employees/ {
        proxy_pass http://node-srv:3000;
        proxy_set_header Host $host;
    }

    # --- 4. DJANGO API & ADMIN ---
    location /api/ {
        proxy_pass http://django-srv:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://django-srv:8000;
        proxy_set_header Host $host;
    }

    # --- 5. STATIC ASSETS ---
    location /static/ {
        alias /app/static/;
    }

    error_page 500 502 503 504 /50x.html;
}