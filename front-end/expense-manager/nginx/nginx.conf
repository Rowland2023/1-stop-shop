server {
    listen 10000; 
    server_name localhost;

    # 1. SERVE REACT STATIC FILES
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoicing)
    # Match the specific path first
    location /api/invoices/ {
        proxy_pass https://invoice-service-ttn6.onrender.com/api/invoices/; 
        proxy_set_header Host invoice-service-ttn6.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. NODE.JS (Employee Management)
    location /api/employees/ {
        proxy_pass https://employee-management-app-wuq1.onrender.com/api/employees/;
        proxy_set_header Host employee-management-app-wuq1.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. DJANGO CORE (Registration, Login, Products, Orders)
    # This is the "catch-all" for any other /api/ calls
    location /api/ {
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for Auth: Don't let Nginx drop the connection during slow DB writes
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 5. ADMIN & STATIC
    location /admin/ {
        proxy_pass https://back-end-wdk7.onrender.com/admin/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }

    location /static/ {
        proxy_pass https://back-end-wdk7.onrender.com/static/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}