events { 
    worker_connections 1024; 
}

http {
    include /etc/nginx/mime.types;
    
    server {
        listen 8080; # Shifted away from the 10000 conflict
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            proxy_set_header Host back-end-wdk7.onrender.com;
        }
    }
}