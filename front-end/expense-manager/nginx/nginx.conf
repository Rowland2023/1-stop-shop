server {
    listen 10000; 
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. FASTAPI (Invoicing) ---
    location /api/invoices/ {
        # Using External URL is often more reliable on Render Free/Starter tiers
        proxy_pass https://invoice-service-ttn6.onrender.com/api/invoices/; 
        proxy_set_header Host invoice-service-ttn6.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 3. NODE.JS (Employee Management) ---
    location /api/employees/ {
        proxy_pass https://employee-management-app-wuq1.onrender.com/api/employees/;
        proxy_set_header Host employee-management-app-wuq1.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 4. DJANGO CORE API ---
    # Put this AFTER specific paths so it doesn't "catch" the others
    location /api/ {
        proxy_pass https://back-end-wdk7.onrender.com/api/;
        proxy_set_header Host back-end-wdk7.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 5. DJANGO ADMIN & STATIC ---
    location /admin/ {
        proxy_pass https://back-end-wdk7.onrender.com/admin/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }

    location /static/ {
        proxy_pass https://back-end-wdk7.onrender.com/static/;
        proxy_set_header Host back-end-wdk7.onrender.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}