events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization: Enable Gzip for faster frontend loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/x-icon;

    server {
        listen 10000;
        server_name localhost;

        # 1. Main Frontend Files
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. Static Media Files (The New Addition)
        location /media/ {
            # This points to where your backend/Docker stores uploaded images
            alias /usr/share/nginx/html/media/; 
            expires 7d;
            add_header Cache-Control "public";
        }

        # 3. Optimized API Proxy
        location /api/ {
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            
            # Force SNI for Render's routing
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Standard Headers
            proxy_set_header Host back-end-wdk7.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}