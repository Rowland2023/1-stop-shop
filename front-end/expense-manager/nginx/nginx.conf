events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 10000;
        server_name localhost;

        # 1. FRONTEND
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 2. PROXY SETTINGS (Use your External Render URLs for stability)
        location /api/ {
            proxy_pass https://back-end-wdk7.onrender.com/api/;
            proxy_set_header Host back-end-wdk7.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Add your other locations (employees, invoices) here as well...
    }
}