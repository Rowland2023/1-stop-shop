# nginx.conf
server {
    listen 10000;
    server_name localhost;

    # 1. REACT FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoice)
    location /api/invoices/ {
        proxy_pass http://invoice-srv:8001; 
        proxy_set_header Host $host;
    }

    # 3. NODE.JS (Employee)
    location /api/employees/ {
        proxy_pass http://node-srv:3000;
        proxy_set_header Host $host;
    }

    # 4. DJANGO (Core Store & Admin)
    location /api/ {
        proxy_pass http://django-srv:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass http://django-srv:8000;
        proxy_set_header Host $host;
    }

    # 5. STATIC IMAGES
    location /static/ {
        alias /app/static/;
    }
}