server {
    listen 10000;
    server_name localhost;

    # Increase upload size limit to allow for product images (default is 1MB)
    client_max_body_size 10M;

    # 1. SERVE REACT FRONTEND
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoicing)
    location /api/invoices/ {
        proxy_pass http://invoice-service-ttn6:8001/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. NODE.JS (Employee Management)
    location /api/employees/ {
        proxy_pass http://employee-management-app-wuq1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. DJANGO CORE (Registration, Login, Products, Orders)
    location /api/ {
        proxy_pass http://back-end-wdk7:10000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Performance buffers for larger JSON (Product lists)
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        proxy_read_timeout 90s;
    }

    # 5. ADMIN & STATIC ASSETS
    location /admin/ {
        proxy_pass http://back-end-wdk7:10000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://back-end-wdk7:10000/static/;
        proxy_set_header Host $host;
    }

    # 6. MEDIA ASSETS (The fix for Product Images)
    location /media/ {
        proxy_pass http://back-end-wdk7:10000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}